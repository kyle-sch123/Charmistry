name = "charmistry"
compatibility_date = "2025-04-11"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Keep Worker logs on so PayFast ITN delivery (and any runtime error) is
# observable in the dashboard. The remote Worker previously had this off,
# which hid the /api/payfast/notify invocations during debugging.
[observability.logs]
enabled = true
